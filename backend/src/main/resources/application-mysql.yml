spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:jway_blog}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

admin:
  api-prefix: ${ADMIN_API_PREFIX}
  username: ${ADMIN_USERNAME}
  password: ${ADMIN_PASSWORD:}
  password-hash: ${ADMIN_PASSWORD_HASH:}
  entry-key: ${ADMIN_ENTRY_KEY}
